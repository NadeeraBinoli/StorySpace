{% extends "base.html" %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card card-minimal mb-5 border-0 bg-card shadow-sm p-4 text-center border-main" style="border: 1px solid var(--border-color) !important;">
                <div class="card-body py-5">
                    <div class="mb-4 text-danger">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-exclamation-circle" viewBox="0 0 16 16">
                          <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                          <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/>
                        </svg>
                    </div>
                    <h2 class="fw-bold mb-3" style="letter-spacing: -0.5px;">Delete Story?</h2>
                    <p class="text-muted mb-5 fs-5">
                        Are you sure you want to permanently delete<br>
                        "<strong>{{ object.title }}</strong>"?<br>
                        <span class="small">This action cannot be undone.</span>
                    </p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a class="btn btn-light btn-modern px-4" href="{% url 'post-detail' object.id %}">Cancel</a>
                            <button class="btn btn-danger btn-modern px-4" type="submit">Yes, Delete</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
