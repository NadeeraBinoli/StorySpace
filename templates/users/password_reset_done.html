{% extends "base.html" %}

{% block title %}Email Sent - StorySpace{% endblock %}

{% block content %}
    <div class="row justify-content-center reveal">
        <div class="col-md-8 col-lg-7">
            <div class="card card-minimal mb-5 border-0 bg-card shadow p-5 text-center border-main" style="border: 1px solid var(--border-color) !important;">
                <div class="mb-4">
                    <div class="bg-success bg-opacity-10 d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 80px; height: 80px;">
                        <i class="bi bi-envelope-check-fill text-success fs-1"></i>
                    </div>
                </div>
                <h2 class="fw-bold mb-3">Check Your Inbox</h2>
                <p class="text-muted fs-5 mb-4">We've sent an email with instructions to reset your password. Please check your spam folder if you don't see it within a few minutes.</p>
                <div class="pt-4 border-top border-main">
                    <a href="{% url 'login' %}" class="btn btn-dark btn-modern px-5">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
