{% extends "base.html" %}

{% block title %}Reset Password - StorySpace{% endblock %}

{% block content %}
    <div class="row justify-content-center reveal">
        <div class="col-md-8 col-lg-7">
            <div class="card card-minimal mb-5 border-0 bg-card shadow p-4 border-main" style="border: 1px solid var(--border-color) !important;">
                <div class="card-body p-3">
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 64px; height: 64px;">
                            <i class="bi bi-key-fill text-primary fs-2"></i>
                        </div>
                        <h2 class="fw-bold mb-1" style="letter-spacing: -1px;">Reset Password</h2>
                        <p class="text-muted small">Enter your email address to receive a reset link</p>
                    </div>
                    
                    <form method="POST" class="modern-auth-form">
                        {% csrf_token %}
                        <fieldset class="form-group mb-4">
                            <div class="form-modern">
                                {{ form.as_p }}
                            </div>
                        </fieldset>
                        <div class="form-group mb-3">
                            <button class="btn btn-dark btn-modern w-100 py-3 d-flex justify-content-center align-items-center" type="submit">
                                Request Reset Link <i class="bi bi-envelope-at ms-2"></i>
                            </button>
                        </div>
                    </form>

                    <div class="text-center pt-4 mt-4 border-top border-main">
                        <p class="text-muted small mb-0">
                            Remembered your password? <a class="text-primary fw-bold text-decoration-none ms-1" href="{% url 'login' %}">Back to Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .form-modern p {
            margin-bottom: 1.5rem;
        }
        .form-modern label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-modern input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-main);
            transition: var(--transition);
        }
        .form-modern input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: var(--input-bg);
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.05);
        }
    </style>
{% endblock %}
