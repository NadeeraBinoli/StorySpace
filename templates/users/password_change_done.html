{% extends "base.html" %}

{% block title %}Password Changed - StorySpace{% endblock %}

{% block content %}
    <div class="row justify-content-center reveal">
        <div class="col-md-8 col-lg-6">
            <div class="card card-minimal mb-5 border-0 bg-card shadow p-4 p-md-5 text-center">
                <div class="mb-4">
                    <div class="bg-success bg-opacity-10 d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 80px; height: 80px;">
                        <i class="bi bi-check-circle-fill text-success fs-1"></i>
                    </div>
                    <h2 class="fw-bold mb-2" style="letter-spacing: -1px;">Password Updated!</h2>
                    <p class="text-muted">Your account password has been successfully changed.</p>
                </div>
                
                <div class="d-grid gap-2">
                    <a href="{% url 'profile' %}" class="btn btn-dark btn-modern py-3">
                        <i class="bi bi-person-circle me-2"></i>Back to Profile
                    </a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
