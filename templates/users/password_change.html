{% extends "base.html" %}

{% block title %}Change Password - StorySpace{% endblock %}

{% block content %}
    <div class="row justify-content-center reveal">
        <div class="col-md-8 col-lg-6">
            <div class="card card-minimal mb-5 border-0 bg-card shadow p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 64px; height: 64px;">
                        <i class="bi bi-key-fill text-primary fs-2"></i>
                    </div>
                    <h2 class="fw-bold mb-1" style="letter-spacing: -1px;">Change Password</h2>
                    <p class="text-muted small">Update your account security</p>
                </div>
                
                <form method="POST" class="modern-auth-form">
                    {% csrf_token %}
                    <fieldset class="form-group mb-4">
                        <div class="form-modern">
                            {{ form.as_p }}
                        </div>
                    </fieldset>
                    <div class="form-group mb-3">
                        <button class="btn btn-dark btn-modern w-100 py-3 d-flex justify-content-center align-items-center" type="submit">
                            Update Password <i class="bi bi-check2-circle ms-2"></i>
                        </button>
                    </div>
                    <div class="text-center mt-3">
                        <a href="{% url 'profile' %}" class="text-muted text-decoration-none small">
                            <i class="bi bi-arrow-left me-1"></i>Back to Profile
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <style>
        .form-modern p { margin-bottom: 1.5rem; }
        .form-modern label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-modern input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-main);
            transition: var(--transition);
        }
        .form-modern input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: var(--input-bg);
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.05);
        }
        .form-modern ul.errorlist {
            color: #dc3545;
            list-style: none;
            padding: 10px 15px;
            background: rgba(220, 53, 69, 0.1);
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.8rem;
        }
        .form-modern .helptext {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 5px;
            line-height: 1.4;
        }
    </style>
{% endblock %}
